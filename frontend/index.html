<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="description" content="StudyLib — Manage your study library with ease. Students, seats, payments, and reports in one place." />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="StudyLib" />
    <title>StudyLib</title>
  </head>
  <body>
    <div id="root">
      <style>
        @keyframes studylib-spin { to { transform: rotate(360deg); } }
      </style>
      <div style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #09090b; color: #f4f4f5; font-family: system-ui, -apple-system, sans-serif; text-align: center; padding: 24px; box-sizing: border-box;">
        <div style="width: 42px; height: 42px; border: 3px solid #6366f1; border-top-color: transparent; border-radius: 50%; animation: studylib-spin 0.8s linear infinite; margin-bottom: 20px;"></div>
        <h2 style="font-size: 18px; font-weight: 700; margin: 0 0 6px 0; letter-spacing: -0.02em;">Starting StudyLib...</h2>
        <p style="font-size: 13px; color: #a1a1aa; margin: 0 0 24px 0;">Loading application</p>
        <a href="/login" style="display: inline-flex; align-items: center; justify-content: center; padding: 12px 24px; background-color: #4f46e5; color: #ffffff; text-decoration: none; border-radius: 14px; font-size: 14px; font-weight: 600; box-shadow: 0 4px 14px rgba(79, 70, 229, 0.35); transition: background-color 0.2s;">
          Go to Login Page
        </a>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((registration) => {
            // Check for ServiceWorker updates on load
            registration.update();
          }).catch((err) => {
            console.log('PWA ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>
  </body>
</html>
